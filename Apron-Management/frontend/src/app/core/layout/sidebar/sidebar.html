<aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col">

  <div class="h-20 flex items-center px-6 border-b border-slate-800">

    <div>
      <h1 class="text-xl font-bold text-blue-400">
        Apron Manager
      </h1>

      <p class="text-xs text-slate-400">
        Airport Operations
      </p>
    </div>

  </div>

  <nav class="flex-1 p-4">

    @for (item of menuItems; track item.route) {

      <a
        [routerLink]="item.route"
        routerLinkActive="bg-blue-600 text-white"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-300 transition-all duration-200 hover:bg-slate-800 hover:text-white mb-2">

        <span class="text-lg">
          {{ item.icon }}
        </span>

        <span class="font-medium">
          {{ item.title }}
        </span>

      </a>

    }

  </nav>

</aside>
